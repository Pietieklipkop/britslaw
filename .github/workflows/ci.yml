name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run lint
        run: vp lint

      - name: Generate Worker types
        run: vp run gen

      - name: Run check
        run: vp check

      - name: Build
        run: vp build

      - name: Apply local database migrations
        run: vp run db:migrate:local

      - name: Install Playwright Browsers & dependencies
        run: vp exec playwright install --with-deps

      - name: Run unit tests
        run: vp run test:unit -- --run

      - name: Run E2E tests
        run: vp run test:e2e
